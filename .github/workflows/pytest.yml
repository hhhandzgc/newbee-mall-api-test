name: Pytest Automation Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest allure-pytest pytest-rerunfailures requests pymysql selenium

      - name: Check Python syntax
        run: |
          python -m py_compile utils/http_client.py
          python -m py_compile utils/db_utils.py
          python -m py_compile utils/logger.py
          echo "✅ 所有 Python 文件语法检查通过"

      - name: Check pytest can load
        run: |
          pytest --collect-only --ignore=testcases/test_ui
        continue-on-error: true