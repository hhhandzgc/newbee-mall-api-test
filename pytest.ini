[pytest]
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; Allure + 重试配置
; --reruns 2: 失败后用例自动重试 2 次
; --reruns-delay 1: 每次重试间隔 1 秒
addopts = -v --alluredir=./reports/allure_raw --reruns 2 --reruns-delay 1

; 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S